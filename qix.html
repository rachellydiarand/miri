<body>

	<canvas id="qixCanvas" height="600" width="800" style="background-color: black;"></canvas>
	
	<script type="text/javascript">
	
		// properties
		var frameRate = 10;// per second
		var qix = null;// the qix game object will be stored here, and we can call methods on it
		var qixCanvas = document.getElementById("qixCanvas");
		var qixContext = qixCanvas.getContext("2d");
		var gameRunning = false;
		
		// debug logger
		function trace(str) {
			//console.log(str);
		}
		function trace2(str) {
			console.log(str);
		}		
		
		// drawing methods
		function clearCanvas(canvas, context, color) {
			context.clearRect(0, 0, canvas.width, canvas.height);
			//context.fillStyle = '#000000';
			//context.fillRect(0, 0, canvas.width, canvas.height);
			context.beginPath();
		}
		
		function drawLine(ax, ay, bx, by, context, color) {
			context.beginPath();
			context.strokeStyle = color;
			context.moveTo(ax, ay);
			context.lineTo(bx, by);
			context.stroke();
		}
		
		// game logic
		function lineTest() {
			var ax = Math.random() * qixCanvas.width;
			var ay = Math.random() * qixCanvas.height;
			var bx = Math.random() * qixCanvas.width;
			var by = Math.random() * qixCanvas.height;
			drawLine(ax, ay, bx, by, qixContext, qixStylusPenColor);
		}
		
		// Rachel Lydia Rand's linear collision detection
		function buildCollisionDetectionObject() {
			var returnObj = new Object();
			returnObj.count = 0;
			returnObj.getM = function(obj1, obj2)
			{			
				return(((obj1.y) - (obj2.y))/(obj1.x - obj2.x));
			}
			returnObj.getB = function(obj1, obj2)
			{
				return((obj1.y) - (returnObj.getM(obj1,obj2) * obj1.x));
			}
			returnObj.isIntercepting = function(A, B, C, D)
			{
				//return false;
				var	x1 = (returnObj.getB(C,D) - returnObj.getB(A,B)) / (returnObj.getM(A,B) - returnObj.getM(C,D));
				var y1;
				var y2;
								
				if (isNaN(x1))
				{
					if (A.x == B.x)
					{									
						x1 = A.x;
						y1 = (returnObj.getM(C,D) * x1) + returnObj.getB(C,D);					
					}
					else
					{
						x1 = C.x;
						y1 = (returnObj.getM(A,B) * x1) + returnObj.getB(A,B);
					}			
					
				}
				else
				{
					y1 = (returnObj.getM(A,B) * x1) + returnObj.getB(A,B);
					if(isNaN(y1)) {
						return false;
					}
				}
								
				trace("collision detection x1: " + x1 + ", y1: " + y1);
				
				var xInBounds = false;
				var zeroRiseSensitivity = .5;
				if(A.x < B.x){
					if(x1 >= A.x && x1 <= B.x){
						xInBounds = true;
					}
				}
				else{
					if(x1 >= B.x && x1 <= A.x){
						xInBounds = true;
					}
				}
				if(A.x == B.x){
					if (x1 > A.x - zeroRiseSensitivity && x1 < A.x + zeroRiseSensitivity)
					{
						//xInBounds = true;
					}
				}			
					
				
				var yInBounds = false;
				if(A.y < B.y){
					if(y1 >= A.y && y1 <= B.y){
						yInBounds = true;
					}
				}
				else{
					if(y1 >= B.y && y1 <= A.y){
						yInBounds = true;
					}
				}
				if(A.y == B.y){
					if(y1 > A.y - zeroRiseSensitivity && y1 < A.y + zeroRiseSensitivity){
						//yInBounds = true;
					}
				}		
				
				var xInBounds2 = false;
				if(C.x < D.x){
					if(x1 >= C.x && x1 <= D.x){
						xInBounds2 = true;
					}
				}
				else{
					if(x1 >= D.x && x1 <= C.x){
						xInBounds2 = true;
					}
				}
				if(C.x > D.x - zeroRiseSensitivity && C.x < D.x + zeroRiseSensitivity){
					if(x1 > C.x - zeroRiseSensitivity && x1 < C.x + zeroRiseSensitivity){
						xInBounds2 = true;
					}
				}	
				
				var yInBounds2 = false;
				if(C.y < D.y){
					if(y1 >= C.y && y1 <= D.y){
						yInBounds2 = true;
					}
				}
				else{
					if(y1 >= D.y && y1 <= C.y){
						yInBounds2 = true;
					}
				}
				if(C.y > D.y - zeroRiseSensitivity && C.y < D.y + zeroRiseSensitivity){
					//count++
					//trace("c = d",count);
					if(y1 > C.y - zeroRiseSensitivity && y1 < C.y + zeroRiseSensitivity){
						yInBounds2 = true;
					}
				}	
								
				if(x1 == Infinity || x1 == -Infinity || y1 == Infinity || y1 == -Infinity || isNaN(x1) || isNaN(y1)){
					trace("infinity");
					return false;
					//return("Infinity");
						
				}
				
				if(xInBounds && yInBounds && xInBounds2 && yInBounds2){
					returnObj.count++;
					//trace("inbounds ",count);
					var obj = new Object();
					obj.x = x1;
					obj.y = y1;
					return(obj);
				}
				return(false);
			}

			returnObj.findC = function(y1,x1){
				return(Math.sqrt(y1 * y1 + x1 * x1));
			}

			returnObj.inRange = function(A, B, C, D)
			{
				if (Math.min(C.x, D.x) > Math.max(A.x, B.x) || Math.max(C.x, D.x) < Math.min(A.x, B.x) || Math.min(C.y, D.y) > Math.max(A.y, B.y) || Math.max(C.y, D.y) < Math.min(A.y, B.y)) return false;
				return true;
			}
			
			return returnObj;
		}
		
		var collisionDetection = buildCollisionDetectionObject();
		
		function makeGame(canvas, ctx) {
			// making the game object oriented
			// this way we can keep our namespace
			// so that other stuff on the screen
			// can use the draw line and clearCanvas methods
			// I hate leaving these methods out of the main object
			// but there is educational value in it
			// so I'll put those methods in comments here:
			/*
				// drawing methods
				function clearCanvas(canvas, context) {
					canvas.clearRect(0, 0, context.width, context.height);
				}
				
				function drawLine(ax, ay, bx, by, context, color) {
					context.strokeStyle = color;
					context.moveTo(ax, ay);
					context.lineTo(bx, by);
					context.stroke();
				}
			*/
			var obj = new Object();
			obj.frameRate = 30;
			obj.canvas = canvas;
			obj.ctx = ctx;
			obj.stage = new Object();
			obj.stage.width = canvas.width;
			obj.stage.height = canvas.height;
			obj.playing = false;
			obj.enterFrameInterval = 0;
			
			// stash the lines for collision detection
			obj.lines = new Array();
			
			// methods linking to external methods
			obj.drawLine = function(ax, ay, bx, by, color) {
				drawLine(ax, ay, bx, by, obj.ctx, color);
			}
			obj.drawCursorLine = function(ax, ay, bx, by, color) {
				drawLine(ax, ay, bx, by, obj.ctx, color);				
			}
			
			// dimensions
			obj.stage.padding = 20;
			
			// cursor, the players piece
			obj.cursor = new Object();
			obj.cursor.speed = 10;
			obj.cursor.x = 0;
			obj.cursor.y = 0;
			obj.cursor.width = 10;
			obj.cursor.height = 10;
			obj.cursor.style = "#efefef";
			obj.cursor.intersectionStyle = "#ff0000";
			
			// key states (the keyboard moves the player)
			obj.keyThatIsDown = "";
			obj.lastKeyThatWasDown = "";// so that we can not got 180 degrees of last move
			obj.slowdraw = false;
			
			// cursor movements
			obj.moveCursor = function (xp, yp) {
				var onBorder = false;
				var ax, ay, bx, by;
				var A, B, C, D;
				ax = obj.cursor.x;
				ay = obj.cursor.y;
				bx = xp;
				by = yp;
				A = new Object();
				A.x = ax;
				A.y = ay;
				B = new Object();
				B.x = bx;
				B.y = by;
				
				// determine move direction
				var moveDirection = "horizontal";
				if(A.x == B.x) moveDirection = "vertical";
								
				// Q: Are we on the borders?
				// Q: Is the slowdraw or fastdraw key down?
				if(moveDirection == "horizontal")
				{
					if(A.y == obj.stage.padding || (A.y == obj.stage.height - obj.stage.padding)) {
						// on the top or bottom border
						onBorder = true;
						// don't need draw key on here
						// Q: Were we moving?
						// if so, we need to stop/end the move
					}
					else {
						if(obj.slowdraw == false) {
							// we are not drawing
							return;
						}
					}
				}
				else {
					// vertical
					if(A.x == obj.stage.padding || (A.x == obj.stage.width - obj.stage.padding)) {
						// on the left or right border
						onBorder = true;
						// don't need draw key on here
						// Q: Were we moving?
						// if so, we need to stop/end the move
					}
					else {
						if(obj.slowdraw == false) {
							// we are not drawing
							return;
						}
					}
				}
				
				// insert collision detection here
				var collision = false;// the last point that was a collision
				var hit = false;
				if(!onBorder) {				
					for(var a = 0; a < obj.lines.length; a++) {
						C = obj.lines[a].A;
						D = obj.lines[a].B;
						
						if(!collisionDetection.inRange(A, B, C, D)) {
							continue;
						}
						
						//alert(C.x + ", " + C.y + ", " + D.x + ", " + D.y);
						/*
						if(moveDirection == "horizontal") {
							// horizontal
							if(C.x != D.x) {
								// we are moving in the same direction
								// as the line we are testing against
								// let's assign no hit for now
								//alert("hit");
							}
							else {
								if(C.y <= A.y && D.y > A.y)
								{
									hit = true;
									break;
								}
								if(C.y >= A.y && D.y < A.y) {
									hit = true;
									break;
								}
							}
						}
						else {
							// vertical
							
							if(C.x == D.x) {
								// we are moving in the same direction
								// as the line we are testing against
								// let's assign no hit for now
							}
							else {
								if(C.x <= A.x && D.x > A.x) {
									hit = true;
									break;
								}
								if(C.x < A.x && D.x >= A.x) {
									hit = true;
									break;
								}
								if(C.x >= A.x && D.x < A.x) {
									hit = true;
									break;
								}
								if(C.x > A.x && D.x <= A.x) {
									hit = true;
									break;
								}
							}
						}
						*/
											
						// look for collisions
						collision = collisionDetection.isIntercepting(A, B, C, D);
						
						if(collision) {
							// not going to allow this move for now
							// we could make a partial move here
							// just exit function for now
							//return;
							
							// analyze the return object
							// it stores the collision point							
							trace("collision detection returned a hit!");
							trace("Collision: " + collision.x + ", " + collision.y);
							trace("A: " + A.x + ", " + A.y + ", B: " + B.x + ", " + B.y);
							trace("C: " + C.x + ", " + C.y + ", D " + D.x + ", " + D.y);
							
							if(collision.x == A.x && collision.y == A.y)
							{
								// not a hit
								trace("hit ruled out, collision is the starting point");
								continue;
							}
							if(collision.x == B.x && collision.y == B.y)
							{
								// the collision is the ending point
								// that's fine, it's a collision
								// but if we are all on the same plane
								// we are colliding with ourselves
								if(collision.x == A.x && collision.x == B.x && collision.x == C.x && collision.x == D.x) {
									continue;
								}
								if(collision.y == A.y && collision.y == B.y && collision.y == C.y && collision.y == D.y) {
									continue;
								}
							}
							
							if(collision.x == A.x && collision.x == B.x && collision.x == C.x && collision.x == D.x) {
								continue;
							}
							if(collision.y == A.y && collision.y == B.y && collision.y == C.y && collision.y == D.y) {
								continue;
							}
							// not sure
							if(isNaN(collision.y))
							{
								// not a hit
								trace("xxxxxxxxxx");
								continue;
							}
							hit = true;
							break;
						}
					}
					
					if(true && hit) {
						// we collided with another line
						trace("---------------------------");
						trace("We had a collision.  Skipping out of the move.");
						// not sure about this line yet
						//obj.lastKeyThatWasDown = obj.keyThatIsDown;
						trace("collision detection returned a hit!");
						trace("Collision: " + collision.x + ", " + collision.y);
						trace("A: " + A.x + ", " + A.y + ", B: " + B.x + ", " + B.y);
						trace("C: " + C.x + ", " + C.y + ", D " + D.x + ", " + D.y);
						
						// if we are blocked with a collision
						// and then switch direction on next move,
						// we could be doing an illegal 180 turn
						// try to fix it here:
						obj.keyThatIsDown = "";
						return;
					}
					else {
						trace("No collision.  Doing the move....");
						trace("A: " + A.x + ", " + A.y + ", B: " + B.x + ", " + B.y);
					}
				}
				
				var newLineObj = new Object();
				newLineObj.A = A;
				newLineObj.B = B;
				
				if(!onBorder) {
					if(obj.lines.length == 0 || obj.keyThatIsDown != obj.lastKeyThatWasDown) {
						// we changed direction
						obj.lines.push(newLineObj);
					}
					else {
						// we did not change direction
						// simply add on to the previous line
						obj.lines[obj.lines.length - 1].B = newLineObj.B;
					}	
				}
				
				obj.cursor.x = xp;
				obj.cursor.y = yp;
				obj.lastKeyThatWasDown = obj.keyThatIsDown;
			}
			obj.moveLeft = function() {
				var xp = obj.cursor.x - obj.cursor.speed;
				if(xp < obj.stage.padding) {
					xp = obj.stage.padding;
				}
				obj.moveCursor(xp, obj.cursor.y);
			};
			obj.moveRight = function() {
				var xp = obj.cursor.x + obj.cursor.speed;
				if(xp > obj.stage.width - obj.stage.padding) {
					xp = obj.stage.width - obj.stage.padding;
				}
				obj.moveCursor(xp, obj.cursor.y);
			};
			obj.moveUp = function() {
				var yp = obj.cursor.y - obj.cursor.speed;
				if(yp < obj.stage.padding) {
					yp = obj.stage.padding;
				}
				obj.moveCursor(obj.cursor.x, yp);
			};
			obj.moveDown = function() {
				var yp = obj.cursor.y + obj.cursor.speed;
				if(yp > obj.stage.height - obj.stage.padding) {
					yp = obj.stage.height - obj.stage.padding;
				}
				obj.moveCursor(obj.cursor.x, yp);
			};
			
			
			obj.enterFrameCount = 0;
			
			obj.EnterFrame = function() {
				// throw away variables
				obj.enterFrameCount++;
				
				// handle cursor movements
				if(obj.keyThatIsDown == "left") {
					obj.moveLeft();
				}
				else if(obj.keyThatIsDown == "right") {
					obj.moveRight();
				}
				else if(obj.keyThatIsDown == "up") {
					obj.moveUp();
				}
				else if(obj.keyThatIsDown == "down") {
					obj.moveDown();
				}
				
				var x, y, w, h, w2, h2;
				var ax, ay, bx, by;
				var line;
				
				if(!obj.playing || obj.keyThatIsDown != "") {
					obj.playing = true;// first frame
					trace("qix enter frame: " + obj.enterFrameCount);
					// refresh
					clearCanvas(obj.canvas, obj.ctx);
					
					//if(obj.enterFrameCount > 40) return;
					
					// draw line around playing area
					p = obj.stage.padding;
					w = obj.stage.width;
					h = obj.stage.height;
					obj.drawLine(p, p, w - p, p, obj.cursor.style);
					obj.drawLine(w - p, p, w - p, h - p, obj.cursor.style);
					obj.drawLine(w - p, h - p, p, h - p, obj.cursor.style);
					obj.drawLine(p, h - p, p, p, obj.cursor.style);
					
					// draw cursor
					// starting left (180 degrees standard position)
					x = obj.cursor.x;
					y = obj.cursor.y;
					w = obj.cursor.width;
					w2 = Math.round(w / 2);
					h = obj.cursor.height;
					h2 = Math.round(h / 2);										
					obj.drawCursorLine(x - w2, y, x, y - w2, obj.cursor.style);				
					obj.drawCursorLine(x, y - h2, x + w2, y, obj.cursor.style);
					obj.drawCursorLine(x + w2, y, x, y + h2, obj.cursor.style);
					obj.drawCursorLine(x, y + h2, x - w2, y, obj.cursor.style);
					
					// draw cursor lines
					for(var a = 0; a < obj.lines.length; a++) {
						line = obj.lines[a];
						obj.drawLine(line.A.x, line.A.y, line.B.x, line.B.y, obj.cursor.style);
						obj.drawLine(line.A.x, line.A.y, line.A.x + 1, line.A.y - 1, obj.cursor.intersectionStyle);
					}
				}
				
			}
			
			obj.start = function() {
				obj.cursor.x = Math.round(obj.stage.width / 2);
				obj.cursor.y = Math.round(obj.stage.height - obj.stage.padding);
				obj.playing = false; // will draw the first stage and place the cursor				
				// start the frame listener
				clearInterval(obj.enterFrameInterval);
				obj.enterFrameInterval = setInterval(obj.EnterFrame, obj.frameRate);
			}
			
			obj.isValidMove = function(direction) {
				var lastDirection = obj.keyThatIsDown;
				if(lastDirection == "") {
					lastDirection = obj.lastKeyThatWasDown;
				}
				
				// if we are on the border, we want to return true
				if(direction == "left" || direction == "right") {
					if(obj.cursor.y == obj.stage.padding || obj.cursor.y == (obj.stage.height - obj.stage.padding)) return true;						
				}
				if(direction == "up" || direction == "down") {
					if(obj.cursor.x == obj.stage.padding || obj.cursor.x == (obj.stage.width - obj.stage.padding)) return true;						
				}
				
				// else, make sure we can't do a 180 turn!
				
				if(direction == "left"  && lastDirection == "right") return false;
				if(direction == "right"  && lastDirection == "left") return false;
				if(direction == "up"  && lastDirection == "down") return false;
				if(direction == "down"  && lastDirection == "up") return false;
				
				return true;				
			}
			
			obj.keyDown = function(key) {
				//alert(key);
				// always track if controlleft is down
				// can't draw without it
				// but we can move along the perimeter
				// the perimeter includes objects that are already drawn
				// and on the outside (not interior lines)
				if(key == "controlleft") obj.slowdraw = true;
				if(key == "arrowleft" || key == "keya") {
					if(obj.isValidMove("left")) {
						obj.keyThatIsDown = "left";
						// we'll set this once the first move in that direction is made
						//obj.lastKeyThatWasDown = "left";
					}
					else {
						// these pockets of code were allowing movement with rapidfire (no keyup)
						//obj.lastKeyThatWasDown = obj.keyThatIsDown;
						//obj.keyThatIsDown = "";
					}
				}
				else if(key == "arrowright" || key == "keyd") {
					if(obj.isValidMove("right")) {
						obj.keyThatIsDown = "right";
						//obj.lastKeyThatWasDown = "right";
					}
					else {
						//obj.lastKeyThatWasDown = obj.keyThatIsDown;
						//obj.keyThatIsDown = "";
					}
				}
				else if(key == "arrowup" || key == "keyw") {
					if(obj.isValidMove("up")) {
						obj.keyThatIsDown = "up";
						//obj.lastKeyThatWasDown = "up";
					}
					else {
						//obj.lastKeyThatWasDown = obj.keyThatIsDown;
						//obj.keyThatIsDown = "";					
					}
				}
				else if(key == "arrowdown" || key == "keys") {
					if(obj.isValidMove("down")) {
						obj.keyThatIsDown = "down";
						//obj.lastKeyThatWasDown = "down";
					}
					else {
						//obj.lastKeyThatWasDown = obj.keyThatIsDown;
						//obj.keyThatIsDown = "";
					
					}
				}
			}
			
			obj.keyUp = function(key) {
				//alert(key);
				// problemo: two keys could be down at the same time
				// these are the standard last key down is this key up
				if(key == "controlleft") obj.slowdraw = false;
				if(key == "arrowleft" || key == "keya") {
					if(obj.keyThatIsDown == "left") {
						obj.keyThatIsDown = "";
						obj.lastKeyThatWasDown = "left";
					}
				}
				else if(key == "arrowright" || key == "keyd") {
					if(obj.keyThatIsDown == "right") {
						obj.keyThatIsDown = "";
						obj.lastKeyThatWasDown = "right";
					}
				}
				else if(key == "arrowup" || key == "keyw") {
					if(obj.keyThatIsDown == "up") {
						obj.keyThatIsDown = "";
						obj.lastKeyThatWasDown = "up";
					}
				}
				else if(key == "arrowdown" || key == "keys") {
					if(obj.keyThatIsDown == "down") {
						obj.keyThatIsDown = "";
						obj.lastKeyThatWasDown = "down";
					}
				}
				
				
			}
			
			// return the game code object
			// for persistence and ability to call methods like
			// play() and stop() on it
			return obj;
		}
		
		
		// listeners
		function dokeydown(key) {
			key = String(key);
			key = key.toLowerCase();
			//alert(key);
			qix.keyDown(key);
		}
		function dokeyup(key) {
			key = String(key);
			key = key.toLowerCase();
			//alert(key);
			qix.keyUp(key);
		}
		
		// instantiate qix!
		qix = makeGame(qixCanvas, qixContext);
		qix.start();
		
		
		// entry point
		document.addEventListener("keydown", (event) => {
			dokeydown(event.code);
		});
		document.addEventListener("keyup", (event) => {
			dokeyup(event.code);
		});
	
	</script>
</body>
</html>
